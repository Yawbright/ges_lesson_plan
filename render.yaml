services:
  - type: web
    name: ghana-lesson-planner-parser
    runtime: docker
    plan: free
    dockerfilePath: ./parser-service/Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PARSER_SERVICE_PORT
        value: "10000"
      - key: LOCAL_AI_MODEL
        value: claude-sonnet-4-5
      - key: ANTHROPIC_API_KEY
        sync: false
